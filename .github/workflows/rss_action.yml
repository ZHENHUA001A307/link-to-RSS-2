name: Daily RSS Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-rss:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate RSS and Update Progress
        shell: python
        run: |
          import os, datetime, csv
          import xml.etree.ElementTree as ET

          # 1. 确保进度文件存在
          if not os.path.exists('progress.txt'):
              with open('progress.txt', 'w') as f: f.write("0")

          with open('progress.txt', 'r') as f:
              try:
                  idx = int(f.read().strip())
              except:
                  idx = 0

          # 2. 读取 CSV 数据
          rows = []
          if os.path.exists('manga.csv'):
              with open('manga.csv', 'r', encoding='utf-8') as f:
                  reader = csv.reader(f)
                  rows = [row for row in reader if row]
                  if len(rows) > 0:
                      rows = rows[1:]  # 跳过表头

          if idx >= len(rows):
              print("所有记录已更新完毕！")
              exit(0)

          # 3. 提取当前行新数据
          current_row = rows[idx]
          title = current_row[0].strip() if len(current_row) > 0 else "无标题"
          link = current_row[1].strip() if len(current_row) > 1 else ""
          content = current_row[2].strip() if len(current_row) > 2 else ""
          pub_date = datetime.datetime.now().strftime('%a, %d %b %Y %H:%M:%S +0000')

          # 4. 获取旧条目 (实现栈逻辑)
          old_items = []
          if os.path.exists('feed.xml'):
              try:
                  # 解析现有 XML 提取 item 节点
                  tree = ET.parse('feed.xml')
                  root = tree.getroot()
                  for item in root.findall('./channel/item'):
                      # 将 Element 对象转回字符串，并去除多余换行
                      item_str = ET.tostring(item, encoding='unicode').strip()
                      old_items.append(item_str)
              except Exception as e:
                  print(f"读取旧 RSS 文件失败 (可能是首次运行或格式错误): {e}")

          # 5. 构建新条目字符串
          # guid 使用 link，若无 link 则使用标题+索引确保唯一性
          guid_val = link if link else f"{title}-{idx}"
          new_item = f"""    <item>
                <title><![CDATA[{title}]]></title>
                <link>{link}</link>
                <description><![CDATA[{content}]]></description>
                <guid isPermaLink="false">{guid_val}</guid>
                <pubDate>{pub_date}</pubDate>
              </item>"""

          # 6. 合并并限制在 15 个条目 (最新的在前)
          all_items = [new_item] + old_items
          final_items = all_items[:15]

          # 7. 组装最终的 XML 结构
          repo_name = os.environ.get('GITHUB_REPOSITORY', 'MyRepo')
          items_block = "\n".join(final_items)
          
          rss_full = f"""<?xml version="1.0" encoding="UTF-8" ?>
          <rss version="2.0">
          <channel>
            <title>每日更新推送</title>
            <link>https://github.com/{repo_name}</link>
            <description>自动更新的 RSS 列表 (保留最近 15 条)</description>
            <lastBuildDate>{pub_date}</lastBuildDate>
          {items_block}
          </channel>
          </rss>"""

          # 8. 保存文件并更新进度
          with open('feed.xml', 'w', encoding='utf-8') as f:
              f.write(rss_full)
          
          with open('progress.txt', 'w') as f:
              f.write(str(idx + 1))

          print(f"✅ 处理完成！今日推送: {title}")
          print(f"📊 当前栈内条目总数: {len(final_items)}")

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add progress.txt feed.xml
          git commit -m "Update RSS Feed (Stack 15): $(date)" || exit 0
          git push
