name: Daily RSS Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-rss:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate RSS and Update Progress
        shell: python
        run: |
          import os, datetime, csv

          # 1. 确保进度文件存在
          if not os.path.exists('progress.txt'):
              with open('progress.txt', 'w') as f: f.write("0")

          with open('progress.txt', 'r') as f:
              try:
                  idx = int(f.read().strip())
              except:
                  idx = 0

          # 2. 读取 CSV 数据 (支持三列：标题, 链接, 正文)
          rows = []
          if os.path.exists('manga.csv'):
              with open('manga.csv', 'r', encoding='utf-8') as f:
                  # csv.reader 会自动处理逗号转义，非常稳健
                  reader = csv.reader(f)
                  rows = [row for row in reader if row]
                  if len(rows) > 0:
                      # 假设第一行是表头，我们跳过它
                      rows = rows[1:]

          if idx >= len(rows):
              print("所有记录已更新完毕！")
              exit(0)

          # 3. 提取当前行数据
          current_row = rows[idx]
          # 标题
          title = current_row[0].strip() if len(current_row) > 0 else "无标题"
          # 链接
          link = current_row[1].strip() if len(current_row) > 1 else ""
          # 正文（新增：如果CSV有第三列则读取，否则为空字符串）
          content = current_row[2].strip() if len(current_row) > 2 else ""

          # 4. 生成符合标准的 RSS XML
          now = datetime.datetime.now().strftime('%a, %d %b %Y %H:%M:%S +0000')
          rss = f"""<?xml version="1.0" encoding="UTF-8" ?>
          <rss version="2.0">
          <channel>
            <title>每日更新推送</title>
            <item>
              <title><![CDATA[{title}]]></title>
              <link>{link}</link>
              <description><![CDATA[{content}]]></description>
              <guid>{link}</guid>
              <pubDate>{now}</pubDate>
            </item>
          </channel>
          </rss>"""

          # 5. 保存并更新进度
          with open('feed.xml', 'w', encoding='utf-8') as f:
              f.write(rss)
          
          with open('progress.txt', 'w') as f:
              f.write(str(idx + 1))

          print(f"✅ 今日推送: {title}")
          if content:
              print(f"📝 正文预览: {content[:30]}...")

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add progress.txt feed.xml
          git commit -m "Update RSS Feed: $(date)" || exit 0
          git push
